name: Daily LEGO Deals

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:   # GitHub Actions UI에서 수동 실행 가능

permissions:
  contents: write      # docs/ 커밋·푸시에 필요

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/run_scrape.py

      - name: Commit and push docs/
        run: |
          git config user.name  "LEGO Deals Bot"
          git config user.email "bot@github.com"
          git add docs/ results/ config/prices.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
            git push
          fi
